spring.application.name=promotion-platform

# PostgreSQL configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/promotions_db
spring.datasource.username=postgres
spring.datasource.password=postgres

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server port (8080 is often already used on Windows)
server.port=8081

# JWT configuration
app.jwt.secret=ChangeThisSecretKeyToAStrongValueWithAtLeast32Characters
app.jwt.expiration-ms=86400000

# Gemini configuration. Set GEMINI_API_KEY in the environment before starting Spring Boot.
app.gemini.api-key=${GEMINI_API_KEY:}
app.gemini.model=${GEMINI_MODEL:gemini-2.5-flash}
app.gemini.base-url=${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}

# Groq/Llama configuration for platform admin copilot.
# Set GROQ_API_KEY in the environment before starting Spring Boot.
app.groq.api-key=${GROQ_API_KEY:}
app.groq.model=${GROQ_MODEL:llama-3.1-8b-instant}
app.groq.base-url=${GROQ_BASE_URL:https://api.groq.com/openai/v1}

# Jackson: serialize LocalDateTime as ISO-8601 string, not array
spring.jackson.serialization.write-dates-as-timestamps=false

# Google OAuth2 manual authorization-code flow
promolink.oauth2.google.client-id=294067615432-t1qjngghnas1r566p2k4j435gpj0u1p4.apps.googleusercontent.com
promolink.oauth2.google.client-secret=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
promolink.oauth2.google.scope=openid email profile
promolink.oauth2.google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8081/login/oauth2/code/google}
promolink.oauth2.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
promolink.oauth2.google.token-uri=https://oauth2.googleapis.com/token
promolink.oauth2.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
promolink.frontend.oauth-callback-url=${FRONTEND_OAUTH_CALLBACK_URL:http://localhost:4200/oauth2/google/callback}
