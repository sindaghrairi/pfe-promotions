spring.application.name=promotion-platform

# PostgreSQL configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/promotions_db
spring.datasource.username=postgres
spring.datasource.password=postgres

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server port (8080 is often already used on Windows)
server.port=8081

# JWT configuration
app.jwt.secret=ChangeThisSecretKeyToAStrongValueWithAtLeast32Characters
app.jwt.expiration-ms=86400000

# Jackson: serialize LocalDateTime as ISO-8601 string, not array
spring.jackson.serialization.write-dates-as-timestamps=false
